<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hiringhood - AI Interview</title>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --bg: #f3f4f6; --text-main: #1f2937; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; width: 100%; max-width: 700px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .content { padding: 40px; min-height: 200px; }
        .controls { padding: 30px; background: #f8fafc; display: flex; flex-direction: column; align-items: center; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; }
        .btn-record { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px;}
        .btn-record:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-stop { background: var(--danger); }
        
        /* NEW: Live Captions Box Styling */
        .live-transcript { 
            width: 100%; 
            min-height: 60px; 
            max-height: 150px; 
            background-color: #e5e7eb; 
            color: #374151; 
            border-radius: 8px; 
            padding: 15px; 
            box-sizing: border-box;
            font-style: italic; 
            text-align: left; 
            overflow-y: auto;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen" style="padding: 60px;">
            <h2>Welcome to your AI Interview</h2>
            <button class="btn-record" onclick="initializePermissions()">Grant Permissions & Start</button>
        </div>

        <div id="interview-room" style="display: none;">
            <div class="header">
                <h2>Hiringhood Interview</h2>
            </div>
            <div class="content">
                <p id="ai-message" style="font-size: 1.5rem; font-weight: 500;">Connecting to Tara...</p>
            </div>
            <div class="controls">
                <button id="record-btn" class="btn-record" disabled onclick="toggleRecording()">
                    <span id="btn-text">Waiting for AI...</span>
                </button>
                
                <div id="live-transcript" class="live-transcript">Your spoken text will appear here...</div>
            </div>
        </div>
    </div>

    <audio id="audio-player" autoplay></audio>

    <script>
        const sessionId = "SESSION_ID_PLACEHOLDER";
        const wsUrl = `ws://localhost:8000/ws/interview/${sessionId}`;
        
        let ws;
        let isRecording = false;
        
        let audioContext;
        let processor;
        let globalStream;

        const startScreen = document.getElementById("start-screen");
        const interviewRoom = document.getElementById("interview-room");
        const aiMessage = document.getElementById("ai-message");
        const recordBtn = document.getElementById("record-btn");
        const btnText = document.getElementById("btn-text");
        const audioPlayer = document.getElementById("audio-player");
        const liveTranscript = document.getElementById("live-transcript");

        function initializePermissions() {
            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
            audioPlayer.play().catch(e => console.log(e));

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                globalStream = stream;
                startScreen.style.display = "none";
                interviewRoom.style.display = "block";
                connectWebSocket();
            }).catch(err => alert("Microphone access denied."));
        }

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onmessage = (event) => {
                let data = JSON.parse(event.data);
                
                if (data.type === "ai_question" || data.type === "interview_complete") {
                    aiMessage.innerText = data.text;
                    recordBtn.disabled = true;
                    btnText.innerText = "Listening to AI...";
                    liveTranscript.innerText = "Waiting for your turn...";
                    
                    if (data.audio_base64) {
                        audioPlayer.src = "data:audio/wav;base64," + data.audio_base64;
                        audioPlayer.onended = () => {
                            if (data.type !== "interview_complete") {
                                recordBtn.disabled = false;
                                btnText.innerText = "Start Speaking";
                                liveTranscript.innerText = "Click 'Start Speaking' and begin answering.";
                            } else {
                                recordBtn.style.display = 'none';
                                liveTranscript.style.display = 'none';
                            }
                        };
                    }
                } 
                // CATCH LIVE TEXT HERE
                else if (data.type === "interim_transcript") {
                    liveTranscript.innerText = `"${data.text}"`;
                    // Auto-scroll to bottom of text box
                    liveTranscript.scrollTop = liveTranscript.scrollHeight; 
                } 
                else if (data.type === "transcript_success") {
                    liveTranscript.innerText = `"${data.text}"`;
                    btnText.innerText = "Evaluating Answer...";
                }
            };
        }

        function toggleRecording() {
            if (!isRecording) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(globalStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = function(e) {
                    if (!isRecording || ws.readyState !== WebSocket.OPEN) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    
                    const bytes = new Uint8Array(pcm16.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.byteLength; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    ws.send(JSON.stringify({ type: "audio_chunk", audio: window.btoa(binary) }));
                };

                ws.send(JSON.stringify({ type: "start_recording" }));
                isRecording = true;
                recordBtn.classList.add("btn-stop");
                btnText.innerText = "Finish Answer";
                liveTranscript.innerText = "Listening...";
                
            } else {
                isRecording = false;
                if (processor) processor.disconnect();
                if (audioContext) audioContext.close();
                
                ws.send(JSON.stringify({ type: "stop_recording" }));
                recordBtn.disabled = true;
                recordBtn.classList.remove("btn-stop");
                btnText.innerText = "Analyzing Silence...";
            }
        }
    </script>
</body>
</html>
